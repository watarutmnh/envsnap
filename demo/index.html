<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvSnap</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(var(--border))',
                        input: 'hsl(var(--input))',
                        ring: 'hsl(var(--ring))',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        primary: {
                            DEFAULT: 'hsl(var(--primary))',
                            foreground: 'hsl(var(--primary-foreground))',
                        },
                        secondary: {
                            DEFAULT: 'hsl(var(--secondary))',
                            foreground: 'hsl(var(--secondary-foreground))',
                        },
                        muted: {
                            DEFAULT: 'hsl(var(--muted))',
                            foreground: 'hsl(var(--muted-foreground))',
                        },
                        accent: {
                            DEFAULT: 'hsl(var(--accent))',
                            foreground: 'hsl(var(--accent-foreground))',
                        },
                        card: {
                            DEFAULT: 'hsl(var(--card))',
                            foreground: 'hsl(var(--card-foreground))',
                        },
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                        mono: ['SF Mono', 'Monaco', 'Inconsolata', 'Fira Mono', 'Droid Sans Mono', 'Source Code Pro', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%;
            --accent-foreground: 240 5.9% 10%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 5.9% 10%;
            --radius: 0.625rem;
        }

        * { border-color: hsl(var(--border)); }
        body { font-feature-settings: "rlig" 1, "calt" 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

        @keyframes checkmark {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .checkmark-animate { animation: checkmark 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen bg-background text-foreground">

    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
        <div class="w-full max-w-lg space-y-6">

            <!-- Header -->
            <div class="text-center space-y-2 fade-in">
                <h1 class="text-2xl font-semibold tracking-tight">EnvSnap</h1>
                <p class="text-sm text-muted-foreground">
                    Your browser environment info. Click copy and share it.
                </p>
            </div>

            <!-- Environment Cards -->
            <div id="envCards" class="grid grid-cols-2 gap-3 fade-in fade-in-delay-1">
                <!-- Cards are populated by JS -->
            </div>

            <!-- Copy Button -->
            <div class="fade-in fade-in-delay-2">
                <button
                    id="copyBtn"
                    onclick="handleCopy()"
                    disabled
                    class="w-full inline-flex items-center justify-center gap-2 h-11 px-6 rounded-md bg-primary text-primary-foreground text-sm font-medium transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50"
                >
                    <svg id="copyIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
                    </svg>
                    <span id="copyText">Copy to Clipboard</span>
                </button>
            </div>

            <!-- Post-copy message (hidden by default) -->
            <div id="postCopy" class="hidden text-center">
                <p class="text-sm text-muted-foreground">
                    Paste it into your chat, email, or support ticket.
                </p>
            </div>

            <!-- Footer -->
            <div class="text-center fade-in fade-in-delay-3">
                <p class="text-xs text-muted-foreground">
                    Powered by <a href="https://github.com/watarutmnh/envsnap" target="_blank" rel="noopener noreferrer" class="underline underline-offset-4 hover:text-foreground transition-colors">EnvSnap</a>
                </p>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/@watarutmnh/envsnap@latest/dist/index.global.js"></script>
    <script>
        let envData = null;

        const cardConfig = [
            { key: 'browser', label: 'Browser',  icon: 'globe',   format: d => `${d.browser.name} ${d.browser.version}` },
            { key: 'os',      label: 'OS',       icon: 'monitor', format: d => `${d.os.name} ${d.os.version}`.trim() },
            { key: 'screen',  label: 'Screen',   icon: 'layout',  format: d => `${d.screen.screenWidth} × ${d.screen.screenHeight}` },
            { key: 'device',  label: 'Device',   icon: 'cpu',     format: d => d.device.isMobile ? 'Mobile' : d.device.isTablet ? 'Tablet' : 'Desktop' },
            { key: 'network', label: 'Network',  icon: 'wifi',    format: d => d.network.supported ? (d.network.type || (d.network.onLine ? 'Online' : 'Offline')) : (d.network.onLine ? 'Online' : 'Offline') },
            { key: 'tz',      label: 'Timezone',  icon: 'clock',   format: d => d.timezone.timezone || 'Unknown' },
        ];

        const icons = {
            globe: '<circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"></path>',
            monitor: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>',
            layout: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>',
            cpu: '<rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line>',
            wifi: '<path d="M5 12.55a11 11 0 0114.08 0"></path><path d="M1.42 9a16 16 0 0121.16 0"></path><path d="M8.53 16.11a6 6 0 016.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line>',
            clock: '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
        };

        function renderCards() {
            const container = document.getElementById('envCards');
            container.innerHTML = cardConfig.map(card => {
                const value = envData ? card.format(envData) : '...';
                return `
                    <div class="rounded-lg border bg-card p-4 space-y-2">
                        <div class="flex items-center gap-2 text-muted-foreground">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">${icons[card.icon]}</svg>
                            <span class="text-xs font-medium">${card.label}</span>
                        </div>
                        <p class="text-sm font-medium truncate" title="${value}">${value}</p>
                    </div>
                `;
            }).join('');
        }

        async function collectAndRender() {
            try {
                envData = await EnvSnap.collect();
                renderCards();
                document.getElementById('copyBtn').disabled = false;
            } catch (e) {
                console.error('EnvSnap error:', e);
            }
        }

        async function handleCopy() {
            if (!envData) return;

            const btn = document.getElementById('copyBtn');
            const icon = document.getElementById('copyIcon');
            const text = document.getElementById('copyText');
            btn.disabled = true;

            try {
                await EnvSnap.copyToClipboard(envData);

                icon.outerHTML = `<svg id="copyIcon" class="w-4 h-4 checkmark-animate" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                text.textContent = 'Copied!';
                btn.classList.remove('bg-primary', 'hover:bg-primary/90');
                btn.classList.add('bg-emerald-600', 'hover:bg-emerald-600');

                const postCopy = document.getElementById('postCopy');
                postCopy.classList.remove('hidden');
                postCopy.classList.add('slide-up');

                setTimeout(() => {
                    document.getElementById('copyIcon').outerHTML = `<svg id="copyIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>`;
                    text.textContent = 'Copy to Clipboard';
                    btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-600');
                    btn.classList.add('bg-primary', 'hover:bg-primary/90');
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                text.textContent = 'Failed to copy';
                btn.disabled = false;
                setTimeout(() => { text.textContent = 'Copy to Clipboard'; }, 2000);
            }
        }

        renderCards();
        window.addEventListener('load', collectAndRender);
    </script>
</body>
</html>
