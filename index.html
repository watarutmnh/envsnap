<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvSnap</title>
    <style>
        @font-face {
            font-family: 'PP Valve';
            src: url('fonts/PPValve-PlainExtrabold.otf') format('opentype');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PP Valve';
            src: url('fonts/PPValve-PlainMedium.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PP Valve';
            src: url('fonts/PPValve-PlainExtralight.otf') format('opentype');
            font-weight: 200;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: var(--grain-opacity, 0);
            filter: url(#grain);
            background: #fff;
        }

        #env-display {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            padding: 2vmin;
            font-family: 'PP Valve', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 800;
            line-height: 1.05;
            word-break: break-all;
            overflow: hidden;
            opacity: 0;
        }

        #env-display.ready { opacity: 1; }

        .label {
            opacity: 0.35;
            font-weight: 200;
        }

        .sep {
            opacity: 0.12;
            padding: 0 0.12em;
        }

        .float-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            background: #fff;
            border: 2px solid #fff;
            color: #000;
            width: clamp(150px, 18vw, 200px);
            height: clamp(150px, 18vw, 200px);
            padding: 1rem;
            border-radius: 50%;
            font-size: clamp(0.7rem, 1.4vw, 0.9rem);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.3;
            justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: opacity 0.6s ease, transform 0.6s ease, background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'PP Valve', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .float-btn:hover {
            background: #e0e0e0;
            color: #000;
            border-color: #e0e0e0;
        }

        .float-btn:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 4px;
        }

        .float-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .float-btn.copied {
            background: #000;
            border-color: #fff;
            color: #fff;
        }

        @keyframes btnPop {
            0%   { transform: translate(-50%, -50%) scale(0.95); }
            50%  { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .float-btn.pop {
            animation: btnPop 0.35s ease;
        }

        @keyframes btnSettle {
            0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .float-btn.settle {
            animation: btnSettle 0.4s ease-out;
        }

        .float-btn.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .version {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.15);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .version a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .version a:hover {
            color: rgba(255, 255, 255, 0.35);
        }

        .splash {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            font-family: 'PP Valve', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 8vw, 6rem);
            opacity: 0.15;
            letter-spacing: -0.02em;
        }

        @media (prefers-reduced-motion: reduce) {
            .float-btn {
                transition: background 0.2s, color 0.2s, border-color 0.2s;
            }
            .float-btn.pop,
            .float-btn.settle {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <svg style="position:absolute;width:0;height:0" aria-hidden="true">
        <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
        </filter>
    </svg>

    <div id="env-display">
        <div class="splash">ENVSNAP</div>
    </div>

    <button class="float-btn" id="copyBtn" aria-label="Copy environment info to clipboard">
        <span id="copyText">Click to Copy</span>
    </button>

    <div class="version">
        <a href="https://github.com/watarutmnh/envsnap" target="_blank" rel="noopener noreferrer">EnvSnap</a> <span id="versionLabel"></span>
    </div>

    <script src="dist/index.global.js"></script>
    <script>
    (function() {
        'use strict';

        let envData = null;
        let isScrambling = false;
        let isCopying = false;

        function flattenData(data) {
            const items = [];

            items.push({ label: 'Browser', value: `${data.browser.name} ${data.browser.version}` });
            items.push({ label: 'Language', value: data.browser.language });
            if (data.browser.languages.length > 1) {
                items.push({ label: 'Languages', value: data.browser.languages.join(', ') });
            }
            if (!data.os.platformEstimated) {
                items.push({ label: 'Platform', value: data.os.platform });
            }
            items.push({ label: 'Vendor', value: data.browser.vendor });
            items.push({ label: 'Cookies', value: data.browser.cookieEnabled ? 'Enabled' : 'Disabled' });
            if (data.browser.doNotTrack) {
                items.push({ label: 'DNT', value: data.browser.doNotTrack });
            }

            const osValue = data.os.versionEstimated
                ? data.os.name
                : `${data.os.name} ${data.os.version}`.trim();
            items.push({ label: 'OS', value: osValue });
            items.push({ label: 'Arch', value: data.os.is64Bit ? '64-bit' : '32-bit' });

            items.push({ label: 'Screen', value: `${data.screen.screenWidth}\u00d7${data.screen.screenHeight}` });
            items.push({ label: 'Available', value: `${data.screen.availWidth}\u00d7${data.screen.availHeight}` });
            items.push({ label: 'Viewport', value: `${data.screen.viewportWidth}\u00d7${data.screen.viewportHeight}` });
            items.push({ label: 'Color', value: `${data.screen.colorDepth}bit` });
            items.push({ label: 'PixelDepth', value: `${data.screen.pixelDepth}bit` });
            items.push({ label: 'Orientation', value: data.screen.orientation });

            items.push({ label: 'Device', value: data.device.isMobile ? 'Mobile' : data.device.isTablet ? 'Tablet' : 'Desktop' });
            if (!data.device.hardwareConcurrencyEstimated) {
                items.push({ label: 'Cores', value: `${data.device.hardwareConcurrency}` });
            }
            items.push({ label: 'DPR', value: `${data.device.devicePixelRatio}\u00d7` });
            items.push({ label: 'Touch', value: data.device.touchSupport ? `Yes (${data.device.maxTouchPoints}pt)` : 'No' });
            items.push({ label: 'Vibration', value: data.device.vibrationSupport ? 'Yes' : 'No' });

            items.push({ label: 'Online', value: data.network.onLine ? 'Yes' : 'No' });
            if (data.network.supported) {
                if (data.network.type) items.push({ label: 'Connection', value: data.network.type });
                if (data.network.effectiveType) items.push({ label: 'EffectiveType', value: data.network.effectiveType });
                if (data.network.downlink) items.push({ label: 'Downlink', value: `${data.network.downlink}Mbps` });
                if (data.network.rtt) items.push({ label: 'RTT', value: `${data.network.rtt}ms` });
                if (data.network.saveData !== undefined) items.push({ label: 'DataSaver', value: data.network.saveData ? 'On' : 'Off' });
            }

            items.push({ label: 'LocalStorage', value: data.storage.localStorage ? 'Yes' : 'No' });
            items.push({ label: 'SessionStorage', value: data.storage.sessionStorage ? 'Yes' : 'No' });
            items.push({ label: 'IndexedDB', value: data.storage.indexedDB ? 'Yes' : 'No' });
            items.push({ label: 'ServiceWorker', value: data.storage.serviceWorker ? 'Yes' : 'No' });
            items.push({ label: 'CacheAPI', value: data.storage.cacheAPI ? 'Yes' : 'No' });
            items.push({ label: 'WebSQL', value: data.storage.webSQL ? 'Yes' : 'No' });

            items.push({ label: 'Timezone', value: data.timezone.timezone });
            const offsetHours = data.timezone.timezoneOffset / -60;
            items.push({ label: 'UTC', value: `${offsetHours >= 0 ? '+' : ''}${offsetHours}` });
            items.push({ label: 'Locale', value: data.timezone.locale });
            items.push({ label: 'Date', value: data.timezone.dateFormat });
            items.push({ label: 'Time', value: data.timezone.timeFormat });

            items.push({ label: 'UA', value: data.userAgent });
            items.push({ label: 'Timestamp', value: data.timestamp });

            return items;
        }

        function buildHTML(items) {
            return items.map(function(item, i) {
                const sep = i < items.length - 1 ? '<span class="sep">/</span>' : '';
                return `<span class="label">${item.label} </span>${item.value}${sep}`;
            }).join('');
        }

        function fitFontSize() {
            const el = document.getElementById('env-display');
            const targetHeight = window.innerHeight;

            let low = 6;
            let high = 300;
            let best = low;

            for (let i = 0; i < 40; i++) {
                const mid = (low + high) / 2;
                el.style.fontSize = mid + 'px';

                if (el.scrollHeight <= targetHeight) {
                    best = mid;
                    low = mid;
                } else {
                    high = mid;
                }

                if (high - low < 0.25) break;
            }

            el.style.fontSize = best + 'px';
        }

        function scrambleReveal(el, duration) {
            duration = duration || 1800;
            const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?';

            // Skip animation for reduced motion preference
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReduced) {
                el.style.opacity = '0.8';
                el.classList.add('ready');
                document.body.style.setProperty('--grain-opacity', '0.2');
                document.getElementById('copyBtn').classList.add('visible');
                return;
            }

            isScrambling = true;

            // Collect all text nodes
            const textNodes = [];
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
            while (walker.nextNode()) {
                const node = walker.currentNode;
                if (node.textContent.trim()) {
                    textNodes.push({
                        node: node,
                        original: node.textContent,
                        revealed: new Array(node.textContent.length).fill(false)
                    });
                }
            }

            // Build shuffled list of all revealable character positions
            const positions = [];
            textNodes.forEach(function(entry, nodeIdx) {
                for (let i = 0; i < entry.original.length; i++) {
                    if (entry.original[i] !== ' ') {
                        positions.push({ nodeIdx: nodeIdx, charIdx: i });
                    }
                }
            });
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = positions[i];
                positions[i] = positions[j];
                positions[j] = tmp;
            }

            const totalChars = positions.length;
            const framesNeeded = Math.ceil(duration / 16);
            const revealPerFrame = Math.max(1, Math.ceil(totalChars / framesNeeded));
            let posIdx = 0;

            function rchar() {
                return CHARS[Math.floor(Math.random() * CHARS.length)];
            }

            function updateDisplay() {
                textNodes.forEach(function(entry) {
                    let result = '';
                    for (let i = 0; i < entry.original.length; i++) {
                        result += (entry.revealed[i] || entry.original[i] === ' ')
                            ? entry.original[i] : rchar();
                    }
                    entry.node.textContent = result;
                });
            }

            function setGrainOpacity(v) {
                document.body.style.setProperty('--grain-opacity', String(v));
            }

            // Initial scramble then show
            updateDisplay();
            el.style.opacity = '0';
            el.classList.add('ready');
            setGrainOpacity(0);

            function animate() {
                let progress = posIdx / totalChars;

                if (posIdx >= totalChars) {
                    // Ensure final state is exact
                    textNodes.forEach(function(e) { e.node.textContent = e.original; });
                    el.style.opacity = '0.8';
                    setGrainOpacity(0.2);
                    isScrambling = false;
                    return;
                }

                // Start button fade-in at 80% so it finishes after scramble ends
                if (progress >= 0.8) {
                    document.getElementById('copyBtn').classList.add('visible');
                }

                const count = Math.min(revealPerFrame, totalChars - posIdx);
                for (let i = 0; i < count; i++) {
                    const pos = positions[posIdx++];
                    textNodes[pos.nodeIdx].revealed[pos.charIdx] = true;
                }

                progress = posIdx / totalChars;
                el.style.opacity = String(progress * 0.8);
                setGrainOpacity(progress * 0.2);
                updateDisplay();
                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        async function collectAndRender() {
            const el = document.getElementById('env-display');

            try {
                envData = await EnvSnap.collect();
                const items = flattenData(envData);
                el.innerHTML = buildHTML(items);
                fitFontSize();
                scrambleReveal(el);
            } catch (e) {
                console.error('EnvSnap error:', e);
                el.innerHTML = '<div class="splash">ERROR</div>';
                el.classList.add('ready');
            }
        }

        async function handleCopy() {
            if (!envData || isCopying) return;
            isCopying = true;

            const btn = document.getElementById('copyBtn');
            const text = document.getElementById('copyText');

            try {
                await EnvSnap.copyToClipboard(envData);
                text.textContent = 'Copied!';
                btn.classList.add('copied');
                btn.classList.remove('pop');
                void btn.offsetWidth;
                btn.classList.add('pop');

                setTimeout(function() {
                    btn.classList.remove('copied', 'pop');
                    btn.classList.add('settle');
                    text.textContent = 'Click to Copy';
                    btn.addEventListener('animationend', function handler() {
                        btn.classList.remove('settle');
                        btn.removeEventListener('animationend', handler);
                        isCopying = false;
                    });
                }, 2000);
            } catch (e) {
                text.textContent = 'Failed';
                setTimeout(function() {
                    text.textContent = 'Click to Copy';
                    isCopying = false;
                }, 2000);
            }
        }

        // Version injection (IIFE build: EnvSnap.EnvSnap.version)
        const versionEl = document.getElementById('versionLabel');
        if (versionEl && typeof EnvSnap !== 'undefined') {
            const cls = EnvSnap.EnvSnap || EnvSnap;
            versionEl.textContent = 'v' + (cls.version || '1.1.0');
        }

        // Event listeners
        document.getElementById('copyBtn').addEventListener('click', handleCopy);
        window.addEventListener('load', collectAndRender);

        let resizeTimer;
        window.addEventListener('resize', function() {
            if (!envData || isScrambling) return;
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(async function() {
                envData = await EnvSnap.collect();
                const el = document.getElementById('env-display');
                el.innerHTML = buildHTML(flattenData(envData));
                fitFontSize();
            }, 200);
        });
    })();
    </script>
</body>
</html>
